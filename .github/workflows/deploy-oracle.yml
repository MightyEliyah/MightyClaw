name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".agents/**"
      - "skills/**"
  workflow_dispatch:

concurrency:
  group: deploy-oracle
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Oracle server
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          timeout: 300s
          script: |
            set -euo pipefail

            cd ~/mighty-craw
            git pull origin main

            # Write .env from GitHub secrets
            printf '%s\n' \
              'OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}' \
              'OPENROUTER_API_KEY=${{ secrets.OPEN_ROUTER_API }}' \
              'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}' \
              'DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}${{ secrets.DISCORD_BOT }}' \
              'WELCOME_CHANNEL_ID=${{ secrets.WELCOME_CHANNEL_ID }}' \
              > .env

            # Deploy gateway config (state dir is mounted as volume)
            sudo mkdir -p ~/.openclaw/state ~/.openclaw/logs ~/.openclaw/logs/stability
            sudo cp config/openclaw.json ~/.openclaw/openclaw.json
            sudo chmod -R 777 ~/.openclaw 2>/dev/null || true
            sudo chown -R ubuntu:ubuntu ~/.openclaw 2>/dev/null || true

            # Rebuild and restart (no sudo — ubuntu is in docker group)
            docker compose build --pull
            docker compose up -d --remove-orphans

            # Activate Discord channel if not already done
            docker compose exec -T openclaw-gateway node dist/index.js channels status 2>/dev/null || true

            # Wait for gateway health
            echo "Waiting for gateway..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:18789/healthz >/dev/null 2>&1; then
                echo "Gateway is up!"
                break
              fi
              sleep 5
            done

            docker compose ps
