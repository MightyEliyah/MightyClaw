name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Get logs via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          timeout: 60s
          script: |
            cd ~/mighty-craw
            echo "=== openclaw.json content ==="
            cat ~/.openclaw/openclaw.json
            echo ""
            echo "=== DISCORD token in container env ==="
            docker compose exec -T openclaw-gateway printenv DISCORD_BOT_TOKEN | cut -c1-10 || echo "NOT FOUND"
            echo ""
            echo "=== Gateway logs from beginning ==="
            docker compose logs --no-log-prefix openclaw-gateway 2>&1 | grep -v "origin not allowed\|ws\]\|task-registry" | head -60
