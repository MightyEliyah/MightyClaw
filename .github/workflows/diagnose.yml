name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Get logs via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          timeout: 60s
          script: |
            cd ~/mighty-craw
            echo "=== .env on disk ==="
            cat .env | sed 's/=.*/=***/'
            echo ""
            echo "=== All env vars in container with DISCORD or OPENCLAW ==="
            docker compose exec -T openclaw-gateway printenv | grep -i "discord\|openclaw\|openrouter" | sed 's/=.*/=***/'
            echo ""
            echo "=== Full gateway startup logs (unfiltered) ==="
            docker compose logs --no-log-prefix --since=10m openclaw-gateway 2>&1 | head -80
