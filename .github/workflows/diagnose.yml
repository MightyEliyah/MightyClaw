name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Get logs via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          timeout: 60s
          script: |
            cd ~/mighty-craw
            echo "=== openclaw.json on host ==="
            cat ~/.openclaw/openclaw.json 2>/dev/null || echo "FILE NOT FOUND"
            echo ""
            echo "=== DISCORD_BOT_TOKEN set? ==="
            grep DISCORD_BOT_TOKEN .env | sed 's/=.*/=***/'
            echo ""
            echo "=== Gateway startup logs ==="
            docker compose logs --tail=100 openclaw-gateway 2>&1 | grep -i "discord\|error\|start\|channel\|token\|config" | head -40
