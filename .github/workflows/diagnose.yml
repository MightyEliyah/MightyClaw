name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Get logs via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          timeout: 60s
          script: |
            cd ~/mighty-craw
            echo "=== Fix permissions ==="
            chmod -R 777 ~/.openclaw
            echo ""
            echo "=== openclaw.json exists? ==="
            ls -la ~/.openclaw/openclaw.json 2>/dev/null || echo "FILE NOT FOUND"
            echo ""
            echo "=== Gateway full startup logs ==="
            docker compose logs --tail=80 openclaw-gateway 2>&1 | head -80
            echo ""
            echo "=== Restart gateway ==="
            docker compose restart openclaw-gateway
            sleep 10
            echo "=== Gateway logs after restart ==="
            docker compose logs --tail=30 openclaw-gateway 2>&1
